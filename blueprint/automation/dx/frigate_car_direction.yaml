blueprint:
  name: Frigate 车辆方向检测器（带通行时间 & 冷却）
  description: >
    通过两个 Frigate 区域判断车辆移动方向。
    使用 binary_sensor 监听进入事件，计算通行时间，并防止短时间内重复触发。
  domain: automation
  input:
    sensor_a:
      name: 区域 A 的 Binary Sensor
      description: 例如 binary_sensor.carin_car_occupancy
      selector:
        entity:
          domain: binary_sensor

    sensor_b:
      name: 区域 B 的 Binary Sensor
      description: 例如 binary_sensor.carout_car_occupancy
      selector:
        entity:
          domain: binary_sensor

    debounce_seconds:
      name: 防抖时间（秒）
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1

    timeout_seconds:
      name: 超时时间（秒）
      default: 6
      selector:
        number:
          min: 1
          max: 30
          step: 1

    cooldown_minutes:
      name: 冷却时间（分钟）
      description: 同一方向触发后，多久内不再响应
      default: 1
      selector:
        number:
          min: 0
          max: 60
          step: 1

    action_a_to_b:
      name: 动作 - A → B
      description: 可用 {{ elapsed_seconds }}
      default: []
      selector:
        action:

    action_b_to_a:
      name: 动作 - B → A
      description: 可用 {{ elapsed_seconds }}
      default: []
      selector:
        action:

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input sensor_a
    to: "on"
    for:
      seconds: !input debounce_seconds
    id: "enter_a"

  - platform: state
    entity_id: !input sensor_b
    to: "on"
    for:
      seconds: !input debounce_seconds
    id: "enter_b"

action:
  # ———————— 冷却检查：读取上次触发时间 ————————
  - condition: template
    value_template: >
      {% set last_time = states('input_text.frigate_direction_cache') | default('') %}
      {% if last_time %}
        {% set last_ts = as_timestamp(last_time) | default(0) %}
        {% set now_ts = now().timestamp() %}
        {{ (now_ts - last_ts) / 60 > cooldown_minutes }}
      {% else %}
        true
      {% endif %}

  - choose:
      # === 先触发 A ===
      - conditions:
          - condition: trigger
            id: "enter_a"
        sequence:
          - variables:
              time_start: "{{ now() }}"
          - wait_for_trigger:
              - platform: state
                entity_id: !input sensor_b
                to: "on"
                for:
                  seconds: !input debounce_seconds
            timeout:
              seconds: !input timeout_seconds
          - choose:
              - conditions: "{{ wait.trigger is not none }}"
                sequence:
                  - variables:
                      time_end: "{{ now() }}"
                      elapsed_seconds: "{{ (time_end - time_start).total_seconds() | round(2) }}"
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.frigate_direction_cache
                    data:
                      value: "{{ now().isoformat() }}"
                  - repeat:
                      count: 1
                      sequence: !input action_a_to_b
              - conditions: "{{ wait.trigger is none }}"
                sequence: []

      # === 先触发 B ===
      - conditions:
          - condition: trigger
            id: "enter_b"
        sequence:
          - variables:
              time_start: "{{ now() }}"
          - wait_for_trigger:
              - platform: state
                entity_id: !input sensor_a
                to: "on"
                for:
                  seconds: !input debounce_seconds
            timeout:
              seconds: !input timeout_seconds
          - choose:
              - conditions: "{{ wait.trigger is not none }}"
                sequence:
                  - variables:
                      time_end: "{{ now() }}"
                      elapsed_seconds: "{{ (time_end - time_start).total_seconds() | round(2) }}"
                  - service: input_text.set_value
                    target:
                      entity_id: input_text.frigate_direction_cache
                    data:
                      value: "{{ now().isoformat() }}"
                  - repeat:
                      count: 1
                      sequence: !input action_b_to_a
              - conditions: "{{ wait.trigger is none }}"
                sequence: []
