blueprint:
  name: Frigate 车辆方向检测器（含通行时间计算）
  description: >
    通过 Frigate 的两个区域判断车辆移动方向，并计算通行时间。
    当车辆在指定时间内先后进入两个区域，触发对应方向的动作。
    动作中可使用变量 {{ elapsed_seconds }} 获取精确时间差（秒）。
  domain: automation
  source_url: https://gist.github.com/yourname/frigate-direction-timing
  input:
    camera_name:
      name: 摄像头名称
      description: Frigate 中的摄像头名称（如 driveway）
      selector:
        text:

    zone_a:
      name: 区域 A 名称
      description: 第一个区域（如 cara）
      selector:
        text:

    zone_b:
      name: 区域 B 名称
      description: 第二个区域（如 carb）
      selector:
        text:

    object_type:
      name: 目标类型
      description: Frigate 检测的对象类型（如 car, person）
      default: car
      selector:
        text:

    debounce_seconds:
      name: 防抖时间（秒）
      description: 区域状态需稳定多少秒才视为有效进入
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 5
          step: 0.1

    timeout_seconds:
      name: 超时时间（秒）
      description: 进入第一个区域后，必须在多少秒内进入第二个区域
      default: 6
      selector:
        number:
          min: 1
          max: 30
          step: 1

    action_a_to_b:
      name: 动作 - A → B
      description: 车辆从区域 A 移动到 B 时执行。可用变量：{{ elapsed_seconds }}
      default: []
      selector:
        action:

    action_b_to_a:
      name: 动作 - B → A
      description: 车辆从区域 B 移动到 A 时执行。可用变量：{{ elapsed_seconds }}
      default: []
      selector:
        action:

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: "binary_sensor.{{ camera_name }}_{{ object_type }}_{{ zone_a }}"
    to: "on"
    for:
      seconds: "{{ debounce_seconds }}"
    id: "enter_a"

  - platform: state
    entity_id: "binary_sensor.{{ camera_name }}_{{ object_type }}_{{ zone_b }}"
    to: "on"
    for:
      seconds: "{{ debounce_seconds }}"
    id: "enter_b"

action:
  choose:
    # === 情况 1：先进入 A ===
    - conditions:
        - condition: trigger
          id: "enter_a"
      sequence:
        - variables:
            time_start: "{{ now() }}"
        - wait_for_trigger:
            - platform: state
              entity_id: "binary_sensor.{{ camera_name }}_{{ object_type }}_{{ zone_b }}"
              to: "on"
              for:
                seconds: "{{ debounce_seconds }}"
          timeout:
            seconds: "{{ timeout_seconds }}"
        - choose:
            - conditions: "{{ wait.trigger is not none }}"
              sequence:
                - variables:
                    time_end: "{{ now() }}"
                    elapsed_seconds: "{{ (time_end - time_start).total_seconds() | round(2) }}"
                - repeat:
                    count: 1
                    sequence: !input action_a_to_b
            - conditions: "{{ wait.trigger is none }}"
              sequence: []

    # === 情况 2：先进入 B ===
    - conditions:
        - condition: trigger
          id: "enter_b"
      sequence:
        - variables:
            time_start: "{{ now() }}"
        - wait_for_trigger:
            - platform: state
              entity_id: "binary_sensor.{{ camera_name }}_{{ object_type }}_{{ zone_a }}"
              to: "on"
              for:
                seconds: "{{ debounce_seconds }}"
          timeout:
            seconds: "{{ timeout_seconds }}"
        - choose:
            - conditions: "{{ wait.trigger is not none }}"
              sequence:
                - variables:
                    time_end: "{{ now() }}"
                    elapsed_seconds: "{{ (time_end - time_start).total_seconds() | round(2) }}"
                - repeat:
                    count: 1
                    sequence: !input action_b_to_a
            - conditions: "{{ wait.trigger is none }}"
              sequence: []
